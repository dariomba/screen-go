services:
  postgres:
    image: postgres:18-alpine
    container_name: screengo-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-screengodb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: screengo-minio
    restart: always
    command: server --console-address ":9090" /data
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc:latest
    container_name: screengo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_DEFAULT_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-screenshots}

  app:
    container_name: screengo-app
    build: .
    ports:
      - "8080:8080"
    environment:
      SCREENGO_API_DB_HOST: postgres
      SCREENGO_API_DB_PORT: 5432
      SCREENGO_API_DB_USER: ${DB_USER:-postgres}
      SCREENGO_API_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SCREENGO_API_DB_NAME: ${DB_NAME:-screengodb}
      SCREENGO_API_API_KEYS: ${SCREEN_GO_API_KEYS:-}
      SCREENGO_API_STORAGE_PROVIDER: s3
      SCREENGO_API_STORAGE_ENDPOINT: http://minio:9000
      SCREENGO_API_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SCREENGO_API_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SCREENGO_API_STORAGE_BUCKET: ${MINIO_DEFAULT_BUCKET:-screenshots}
      SCREENGO_API_STORAGE_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata: